# =============================================================================
# EMU NFC Gate Reader — Happy Hare Integration Macros
# =============================================================================
# Include this file from printer.cfg alongside the hardware config:
#
#   Per-lane install:
#     [include nfc/nfc_reader.cfg]
#     [include nfc/nfc_macros.cfg]
#     [include nfc/nfc_reader_hw.cfg]
#
#   Shared reader install (single PN532 inside MMU body):
#     [include nfc/nfc_reader.cfg]
#     [include nfc/nfc_macros.cfg]
#     [include nfc/nfc_reader_shared.cfg]
#
#   Hybrid (per-lane + shared reader):
#     [include nfc/nfc_reader.cfg]
#     [include nfc/nfc_macros.cfg]
#     [include nfc/nfc_reader_hw.cfg]
#     [include nfc/nfc_reader_shared.cfg]
#
# Customise the GCode bodies here to match your Happy Hare version.  Do not put
# Happy Hare calls in PN532Driver or SpoolmanClient.
#
# ── Per-lane reader macros ────────────────────────────────────────────────────
# Dispatched by nfc_gates/nfc_gate when a tag is read on a gate reader:
#
#   _NFC_SPOOL_CHANGED : GATE (int)  SPOOL_ID (int)  UID (hex string)  [AUTO_CREATED=1]
#                        [SCAN_FINISH=1] accepted for compatibility
#                        — or when Spoolman is disabled —
#                        GATE (int)  MATERIAL (str, optional)  COLOR (hex str, optional)
#                                    TEMP (int °C, optional)   UID (hex string)
#                                    [SCAN_FINISH=1] accepted for compatibility
#   _NFC_SPOOL_REMOVED : GATE (int)
#   _NFC_TAG_NO_SPOOL  : GATE (int)  UID (hex string)  [SCAN_FINISH=1] accepted for compatibility
#   _NFC_SCAN_UNRESOLVED : GATE (int)
#
# Integration model:
#   NFC_Manager reads the tag UID, asks SpoolmanClient to resolve it to a spool,
#   then dispatches these macros.  Happy Hare's local gate map is the source of
#   truth.  MMU_GATE_MAP updates the local map; MMU_SPOOLMAN SYNC=1 pushes the
#   spool location to Spoolman ("<hostname> @ MMU Gate:<gate>").
#   _NFC_TAG_NO_SPOOL fires when a tag UID is not registered in Spoolman.
#
# ── Shared reader macro ───────────────────────────────────────────────────────
# Wire this into Happy Hare's mmu_macro_vars.cfg:
#
#   variable_user_pre_load_extension: '_NFC_SHARED_PRELOAD'
#
#   _NFC_SHARED_PRELOAD: called by HH's user_pre_load_extension hook at the
#     start of every pregate load.  Stages NEXT_SPOOLID from the pending spool
#     tapped on the shared reader.  Safe to leave wired for all loads — it skips
#     while printing and emits an advisory when no spool is pending.
# =============================================================================

[gcode_macro _NFC_SPOOL_CHANGED]
description: Called by nfc_gates/nfc_gate when a spool NFC tag is placed on a gate
gcode:
    {% set gate     = params.GATE | int %}
    {% set uid      = params.UID | default('') %}
    {% if params.SPOOL_ID is defined %}
        {% set spool_id     = params.SPOOL_ID | int %}
        {% set auto_created = params.AUTO_CREATED | default(0) | int %}
        { action_respond_info("[OK] NFC gate %d: spool %d detected (UID %s)%s. Sending to Happy Hare." % (gate, spool_id, uid, " [new spool]" if auto_created else "")) }
        {% if auto_created %}
        MMU_GATE_MAP GATE={gate} SPOOLID=-1 AVAILABLE=0 QUIET=1
        MMU_GATE_MAP GATE={gate} APPLY=1 QUIET=1
        MMU_SPOOLMAN REFRESH=1 QUIET=1
        {% endif %}
        MMU_GATE_MAP GATE={gate} SPOOLID={spool_id} AVAILABLE=1 SYNC=1 QUIET=1
    {% else %}
        {% set name     = params.NAME     | default('') %}
        {% set material = params.MATERIAL | default('') %}
        {% set color    = params.COLOR    | default('') %}
        {% set temp     = params.TEMP     | default('') %}
        { action_respond_info("[OK] NFC gate %d: tag metadata detected (UID %s) — no Spoolman. name=%s material=%s color=%s temp=%s" % (gate, uid, name, material, color, temp)) }
        MMU_GATE_MAP GATE={gate}{% if name %} NAME={name}{% endif %}{% if material %} MATERIAL={material}{% endif %}{% if color %} COLOR={color}{% endif %}{% if temp %} TEMP={temp | int}{% endif %} AVAILABLE=1 QUIET=1
    {% endif %}
    MMU_GATE_MAP GATE={gate} APPLY=1 QUIET=1
    MMU_SPOOLMAN SYNC=1 QUIET=1


[gcode_macro _NFC_SPOOL_REMOVED]
description: Called by nfc_gates/nfc_gate when a spool NFC tag is removed from a gate
gcode:
    {% set gate = params.GATE | int %}
    {% set mmu_action = printer.mmu.action | default("") | lower %}
    {% if "load" in mmu_action or "unload" in mmu_action or "homing" in mmu_action %}
        { action_respond_info("NFC gate %d: tag absent during MMU operation (%s) — ignoring removal." % (gate, mmu_action)) }
    {% else %}
        { action_respond_info("🧹 NFC gate %d: spool removed. Clearing Happy Hare gate." % gate) }
        MMU_GATE_MAP GATE={gate} SPOOLID=-1 AVAILABLE=0 SYNC=1 QUIET=1
        MMU_GATE_MAP GATE={gate} APPLY=1 QUIET=1
        MMU_SPOOLMAN SYNC=1 QUIET=1
    {% endif %}


[gcode_macro NFC_HH_SYNC_CACHE]
description: Re-seed NFC lane cache from Happy Hare gate map
# Reads the current Happy Hare gate map and tells each NFC lane about its
# current spool assignment.  On the next poll, if the NFC reader sees the same
# spool that HH already knows about, the dispatch is suppressed (no redundant
# MMU_GATE_MAP call).  Call this after a Klipper restart if startup_polling is
# manual, or any time you want to re-align the NFC cache with HH state.
#
gcode:
    {% set num      = printer.mmu.num_gates | int %}
    {% set spool_ids = printer.mmu.gate_spool_id %}
    {% set statuses  = printer.mmu.gate_status %}
    RESPOND PREFIX="NFC" MSG="Syncing NFC cache from Happy Hare gate map ({num} gates)..."
    {% for i in range(num) %}
        {% set spool_id = spool_ids[i] | default(-1) | int %}
        {% set status   = statuses[i]  | default(0)  | int %}
        RESPOND PREFIX="NFC" MSG="  gate {i} → lane{i}  spool_id={spool_id}  status={status}"
        NFC GATE={i} HH_SYNC=1 SPOOL_ID={spool_id}
    {% endfor %}
    RESPOND PREFIX="NFC" MSG="Sync complete. Run NFC GATE=N READ=1 to start polling."


[gcode_macro _NFC_SHARED_PRELOAD]
description: Called by Happy Hare pre-load hook — stages NEXT_SPOOLID if a shared reader spool is pending
# Wire this into Happy Hare's _MMU_SEQUENCE_VARS:
#   variable_user_pre_load_extension: '_NFC_SHARED_PRELOAD'
#
# Override this macro in your own cfg to add pre/post logic around the NFC check.
gcode:
    {% set nfc = printer['nfc_gate shared'] %}
    {% set spool_id = nfc.pending_spool_id | default(-1) | int %}
    {% set auto_created = nfc.pending_auto_created | default(False) %}
    {% set gate_spool_ids = printer.mmu.gate_spool_id | default([]) | map('int') | list %}
    {% set already_assigned = spool_id in gate_spool_ids %}
    {% if spool_id > 0 %}
        {% if already_assigned %}
            NFC_SHARED PRELOAD_CLEAR_ASSIGNED=1 SPOOL_ID={spool_id}
        {% else %}
            NFC_SHARED PRELOAD_CHECK=1 EXPECTED_SPOOL_ID={spool_id}
            {% if auto_created %}
                MMU_SPOOLMAN REFRESH=1 QUIET=1
            {% endif %}
            MMU_GATE_MAP NEXT_SPOOLID={spool_id}
            NFC_SHARED PRELOAD_COMMIT=1 SPOOL_ID={spool_id}
        {% endif %}
    {% else %}
        NFC_SHARED PRELOAD_CHECK=1
    {% endif %}


[gcode_macro _NFC_TAG_NO_SPOOL]
description: Called when a tag is detected but its UID is not registered in Spoolman
gcode:
    {% set gate = params.GATE | int %}
    {% set uid  = params.UID %}
    { action_respond_info(
        "NFC gate %d: tag UID %s is not registered in Spoolman.\n"
        "Open the spool record in Spoolman, set the 'rfid_tag' extra field to: %s" %
        (gate, uid, uid)) }
    # Mark the gate occupied/available, but clear the spool assignment and
    # visible filament fields so Happy Hare does not retain stale metadata.
    MMU_GATE_MAP GATE={gate} SPOOLID=-1 NAME=Unknown MATERIAL=Unknown COLOR=FFFFFF TEMP=0 AVAILABLE=1 SYNC=1 QUIET=1
    MMU_GATE_MAP GATE={gate} APPLY=1 QUIET=1


[gcode_macro _NFC_GATE_CLEAR_CACHE]
description: Clear stale Happy Hare gate spool assignment before NFC scan
gcode:
    {% set gate = params.GATE | int %}
    MMU_GATE_MAP GATE={gate} SPOOLID=-1 AVAILABLE=1 QUIET=1


[gcode_macro _NFC_SCAN_UNRESOLVED]
description: Clear stale Happy Hare metadata when scan-jog cannot resolve a spool
gcode:
    {% set gate = params.GATE | int %}
    RESPOND PREFIX="NFC" MSG="scan-jog found no resolvable spool for gate {gate}; clearing stale Happy Hare metadata."
    MMU_GATE_MAP GATE={gate} SPOOLID=-1 NAME=Unknown MATERIAL=Unknown COLOR=FFFFFF TEMP=0 AVAILABLE=1 SYNC=1 QUIET=1
    MMU_GATE_MAP GATE={gate} APPLY=1 QUIET=1
    # Mark the gate occupied/available, but clear the spool assignment so
    # Happy Hare shows "found/no spool" instead of retaining an old spool.
    MMU_GATE_MAP GATE={gate} SPOOLID=-1 AVAILABLE=1 SYNC=1 QUIET=1
    MMU_GATE_MAP GATE={gate} APPLY=1

# =============================================================================
# NFC Shared Reader — LED Effects
# =============================================================================
# These effects fire on the MMU LED segment when a tag is read.
# define_on targets an HH segment defined in [mmu_leds] in mmu_hardware.cfg.
# Common values: exit (button PCBs), entry (dry box LEDs), gates, status.
# install.sh writes the correct define_on automatically during setup.
#
# Enable in nfc_reader_shared.cfg:
#   shared_tag_read_effect:    mmu_RFID_read
#   shared_spool_ready_effect: mmu_RFID_ready
#   shared_tag_unresolved_effect: mmu_RFID_unresolved
#   shared_auto_create_effect: mmu_RFID_creating
# =============================================================================

# Bright white strobe: 2 flashes when the shared reader sees a tag.
[mmu_led_effect mmu_RFID_read]
define_on:   gates
layers:      strobe  1  2  top  (1, 1, 1)

# Bright green strobe: 2 flashes when the spool ID is ready to load.
[mmu_led_effect mmu_RFID_ready]
define_on:   gates
layers:      strobe  1  2  top  (0, 1, 0)

# Bright red strobe: 5 flashes when the tag UID does not resolve to a spool.
[mmu_led_effect mmu_RFID_unresolved]
define_on:   gates
layers:      strobe  1  5  top  (1, 0, 0)

# Bright yellow chase: plays while Spoolman auto-creates a missing spool.
[mmu_led_effect mmu_RFID_creating]
define_on:   gates
layers:      chase  1  .5  top  (1, 1, 0, 1), (0.4, 0.4, 0, 0.4)
