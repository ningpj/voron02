# =============================================================================
# EMU NFC Gate Reader — PN532 I2C Lane Hardware
# =============================================================================
# Supported documented path:
#   one PN532 module per lane MCU / EBB42 board.
#
# Include after nfc_reader.cfg and nfc_macros.cfg:
#   [include nfc/nfc_reader.cfg]
#   [include nfc/nfc_macros.cfg]
#   [include nfc/nfc_reader_hw.cfg]
#
# Each [nfc_gate laneN] section maps:
#   Happy Hare gate number -> Klipper lane MCU -> NFC reader hardware.
#
# i2c_mcu: is consumed by Klipper's I2C bus layer (MCU_I2C_from_config),
# not read explicitly by the plugin.  The MCU name must already exist in
# Klipper / Happy Hare config.  Example: [mcu lane0], [mcu lane1], etc.
#
# ⚠️ After updating Klipper, rebuild and flash the lane MCU / EBB42 firmware.
# Updating the host alone is not enough for PN532 I2C troubleshooting.
# =============================================================================

# ── Lane 0 ────────────────────────────────────────────────────────────────────
[nfc_gate lane0]
mmu_gate:                0
i2c_mcu:                 mmu0
;startup_poll_delay:      0.0

# ── Lane 1 ────────────────────────────────────────────────────────────────────
[nfc_gate lane1]
mmu_gate:                1
i2c_mcu:                 mmu1
;startup_poll_delay:      0.5

# ── Lane 2 example ───────────────────────────────────────────────────────
# [nfc_gate lane2]
# mmu_gate:                2
# i2c_mcu:                 mmu2
# startup_poll_delay:      1.0