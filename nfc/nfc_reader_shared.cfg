# =============================================================================
# EMU NFC Gate Reader — Shared PN532 Hardware
# =============================================================================
# This file configures the optional shared NFC reader — a single PN532 mounted
# inside the MMU body, not tied to any specific lane.
#
# WHY A SEPARATE FILE
# -------------------
# The shared reader lives in its own file so it can be added to any install
# without touching nfc_reader_hw.cfg.  Per-lane readers stay in
# nfc_reader_hw.cfg; the shared reader lives here.  For a hybrid install you
# just add one more [include] line — no merging, no commenting out sections.
#
# HOW TO USE
# ----------
# Pure shared-reader install (no per-lane readers) — replace nfc_reader_hw.cfg:
#   [include nfc/nfc_reader.cfg]
#   [include nfc/nfc_macros.cfg]
#   [include nfc/nfc_reader_shared.cfg]
#
# Hybrid install (per-lane readers + shared reader) — add alongside:
#   [include nfc/nfc_reader.cfg]
#   [include nfc/nfc_macros.cfg]
#   [include nfc/nfc_reader_hw.cfg]
#   [include nfc/nfc_reader_shared.cfg]
#
# WORKFLOW
# --------
# 1. Tap your spool tag on the shared reader — NFC resolves to a Spoolman ID
#    and holds it as pending.
# 2. Drop the spool into an MMU lane and push the filament to the pregate sensor.
# 3. Happy Hare fires user_pre_load_extension → _NFC_SHARED_PRELOAD →
#    MMU_GATE_MAP NEXT_SPOOLID=<id> → spool assigned to the loaded gate.
#
# Wire the Happy Hare pre-load hook in mmu_macro_vars.cfg:
#   variable_user_pre_load_extension: '_NFC_SHARED_PRELOAD'
#
# HARDWARE
# --------
# Run install.sh to fill in hardware values automatically, or edit i2c_mcu,
# i2c_bus, and i2c_address below to match your wiring.
#
# [WARN] After updating Klipper, rebuild and flash the MCU hosting the PN532.
#    The MCU must be on the same Klipper version as the host.
#
# Full setup guide: docs/shared/shared-reader.md
# =============================================================================

[nfc_gate shared]
i2c_mcu:                mmu
i2c_bus:                i2c3_PB3_PB4        ;  on an EBB42 using the same pins as the temperature sensor
i2c_address:            0x24
shared:                 true
startup_polling:        1

# Optional: name of a [led_effect] to flash bright yellow 2x when a tag is read.
# Run install.sh to auto-generate the effect definition from your mmu_hardware.cfg.
# shared_tag_read_effect: mmu_RFID_read

# Optional: name of a [led_effect] to flash bright green 2x when the spool ID is
# resolved and ready to load into the EMU.
# shared_spool_ready_effect: mmu_RFID_ready

# Optional: name of a [led_effect] to flash bright red 5x when a tag UID does
# not resolve to a Spoolman spool.
# shared_tag_unresolved_effect: mmu_RFID_unresolved

# Optional: name of a [led_effect] to run a bright yellow chase while Spoolman
# creates a missing spool. Stops automatically when the create call finishes.
# shared_auto_create_effect: mmu_RFID_creating

# Seconds a scanned spool stays pending (eligible for the next preload).
# shared_pending_timeout: 120.0

# Seconds polling may run after NFC_SHARED READ=1 without resolving a tag
# before auto-stopping.  No effect for startup_polling or post-PRELOAD_CHECK.
# shared_read_timeout: 120.0

# Consecutive unresolvable UIDs before the console advises MMU_PRELOAD.
shared_missed_limit: 3

# Set to true to block pregate loads entirely when no spool is staged.
force_spool_id: True
