#
# MMU UNIT: A mmu_unit is a physical MMU. It describes the type, characteristics and capabilities (often defined by
# vendor). The name of the unit is used to locate other components including it's toolhead steppers, optional encoder
# and espooler. You should create a [mmu_unit XXX] section for every MMU connected to this printer. The XXX name
# should appear in the 'units' on the [mmu_machine] and be used in the stepper definitions and accessory names.
#
[mmu_unit unit0]
num_gates                 : 4				# Number of gates/lanes *this* mmu_unit

# MMU Vendor & Version is used to automatically configure some parameters, validate configuration and set logos
#
# ERCF          1.1  add "s" suffix for Springy, "b" for Binky, "t" for Triple-Decky
#                    e.g. "1.1sb" for v1.1 with Springy mod and Binky encoder
# ERCF          2.0  community edition ERCFv2
# ERCF          3.0  community edition ERCFv3
#
# Tradrack      1.0  add "e" if encoder is fitted (assumed to be Binky)
#
# AngryBeaver
# BoxTurtle
# NightOwl
# 3MS                https://github.com/3dcoded/3ms
# QuattroBox
# 3D Chameleon
# Pico
# MMX
# MMX6
# VVD                BTT ViViD
# KMS                https://github.com/muzixiaoyang/KMS
# EMU
# LowRider
# Prusa         3.0  Not yet supported - Comming soon
# Other              Generic setup that may require further customization of 'cad' parameters. See doc in mmu_parameters.cfg
#
vendor                    : EMU    			# MMU family
version                   : 1.0				# MMU hardware version number

display_name              : unit0   			# Display name of mmu_unit in UI's. Defaults to the vendor name
buffer                    : unit0   			# Name of sync-feedback [mmu_buffer XXX] if fitted (can be shared with other mmu_units)
toolhead                  : default			# Name of [mmu_toolhead XXX] associated with unit (defined in mmu.cfg, can be shared)
extruder_name             : extruder			# Name of extruder that mmu_unit is attached to. Defaults to 'extruder'

# PER-GATE environement sensors. Some modular MMU designs have per-gate control (e.g. EMU). For this type of MMU, leave
# 'environment_sensor' empty and define a comma separated list of sensors here (length must match the number of gates)
#
environment_sensors       : unit0_env0, unit0_env1, unit0_env2, unit0_env3

# MMU Kinematics
#
# Define the motion hardware for MMU kinematics. The hardware need is based on 'selector_type'. This is automatically set
# for known MMU models, but if custom, be sure to set the advanced settings including 'selector_type'
# It is safe to leave these settings empty if not applicable - they will be ignored.
#
gear_steppers             : unit0_gear, unit0_gear_1, unit0_gear_2, unit0_gear_3

# MMU Capabilities
#
# The following attributes are set during install based on MMU vendor/version and control basic operation.
# Only customize if you know what you are doing, or for custom ("Other") designs.
# Current selector types:
#   Type-A: LinearSelector, LinearServoSelector, IndexedSelector, MacroSelector, RotarySelector
#   Type-B: VirtualSelector
#   Type-C: LinearMultiGearSelector
#
selector_type             : VirtualSelector
variable_bowden_lengths   : 1		# 1 = If MMU design has different bowden lengths per gate, 0 = bowden length is the same
variable_rotation_distances: 1		# 1 = If MMU design has dissimilar drive/BMG gears, thus rotation distance, 0 = One drive gear (e.g. Tradrack)
require_bowden_move       : 1		# 1 = If MMU design has bowden move that is included in load/unload, 0 = zero length bowden (skip bowden move)
filament_always_gripped   : 1		# 1 = Filament is always trapped by MMU (most type-B designs), 0 = MMU can release filament
show_bypass               : 0		# 1 = Force showing of bypass gate in UI (overruled if selector explicitly implements bypass)



