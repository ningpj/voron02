#
# FILAMENT DRIVE / GEAR STEPPER:
# Note about "touch" endstops: Happy Hare provides extremely flexible homing options. The "touch" option
# leverages stallguard and thus requires the appropriate 'diag_pin' and stallguard parameters set on the TMC
# driver section. If you have the diag_pin exposed, it is harmless to define this because they will only
# be used when explicitly needed and configured. Patience is needed to carefully tune stallguard.
#
# Touch option for gear stepper provides the (experimental) automatic detection of the extruder entrance
# (see 'extruder_homing_endstop; mmu_gear_touch' in mmu_parameters.cfg)
#
[tmc2209 mmu_stepper unit0_gear]
uart_pin                  : unit0_gate0:PB6
run_current               : 0.8
hold_current              : 0.1			# Recommend to be small if not using "touch" or move (TMC stallguard)
interpolate               : True
sense_resistor            : 0.110		# Usually 0.11, 0.15 for BTT TMC2226
stealthchop_threshold     : 0		        # Spreadcycle has more torque and better at speed

# Uncomment two lines below if you have TMC and want the ability to use filament "touch" homing with gear stepper
#diag_pin                  : 			# Set to MCU pin connected to TMC DIAG pin for gear stepper
#driver_SGTHRS             : 60			    # 255 is most sensitive value, 0 is least sensitive

[mmu_stepper unit0_gear]
step_pin                  : unit0_gate0:PB5
dir_pin                   : unit0_gate0:PB4
enable_pin                : !unit0_gate0:PB7
rotation_distance         : 22.8712    	    # Typically 22.73 for Bondtech. OVERRIDDEN by calibrated 'mmu_*_gear_rotation_distances' in mmu_vars.cfg
gear_ratio                : 1:1  		# E.g. ERCFv2 80:20, Tradrack 50:17
microsteps                : 4 			# Recommend 16. Increase only if you "step compress" issues when syncing
full_steps_per_rotation   : 200		        # 200 for 1.8 degree, 400 for 0.9 degree

# Uncomment the two lines below to enable filament "touch" movement option with gear motor
#extra_endstops:
#    mmu_gear_touch=tmc2209_unit0_gear:virtual_endstop

# ADDITIONAL FILAMENT DRIVE GEAR STEPPERS FOR TYPE-B/C MMU's:
# Note that common parameters are inherited from base 'unit0_gear' and TMC
# (if of same type) to avoid repetition. However then can also be uniquely specified
#
# Filament Drive Gear_1 --------------------------
[tmc2209 mmu_stepper unit0_gear_1]
uart_pin                  : unit0_gate1:PB6

[mmu_stepper unit0_gear_1]
step_pin                  : unit0_gate1:PB5
dir_pin                   : unit0_gate1:PB4
enable_pin                : !unit0_gate1:PB7

# Filament Drive Gear_2 --------------------------
[tmc2209 mmu_stepper unit0_gear_2]
uart_pin                  : unit0_gate2:PB6

[mmu_stepper unit0_gear_2]
step_pin                  : unit0_gate2:PB5
dir_pin                   : unit0_gate2:PB4
enable_pin                : !unit0_gate2:PB7

# Filament Drive Gear_3 --------------------------
[tmc2209 mmu_stepper unit0_gear_3]
uart_pin                  : unit0_gate3:PB6

