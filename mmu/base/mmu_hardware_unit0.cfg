#
# MMU FILAMAENT SENSORS: Define the pins for optional sensors in the filament path. A single [mmu_sensors] section is
# defined to cover ALL the gates of the mmu_unit and gate numbers always start with 0. All but the mmu entry sensors will
# be automatically# setup as both endstops (for homing) and sensors for visibility purposes
#
#   'mmu_entry_switch_pin_X'     .. 'mmu_entry_X' sensor detects filament at entry to MMU. X=gate number (0..N)
#   'mmu_exit_switch_pin_X'      .. 'mmu_exit_X' sensor on exit of each gate. Common on type-B but not type-A
#   'mmu_shared_exit_switch_pin' .. 'mmu_shared_exit' shared exit sensor detects filament past all gates (aka hub sensor)
#
# Pin configuration is flexible: Simply define pins for any sensor you want to enable, if pin is empty it will be
# ignored so no need to comment out what you are not using.
#
[mmu_sensors unit0]
mmu_entry_switch_pin_0    : ^unit0_gate0:PA1
mmu_entry_switch_pin_1    : ^unit0_gate1:PA1
mmu_entry_switch_pin_2    : ^unit0_gate2:PA1
mmu_entry_switch_pin_3    : ^unit0_gate3:PA1

mmu_exit_switch_pin_0     : ^unit0_gate0:PA0
mmu_exit_switch_pin_1     : ^unit0_gate1:PA0
mmu_exit_switch_pin_2     : ^unit0_gate2:PA0
mmu_exit_switch_pin_3     : ^unit0_gate3:PA0


# Whether to register the sensors for visibility in klipper UI's and with QUERY_SENSOR command
#
register_mmu_sensors      : 1



